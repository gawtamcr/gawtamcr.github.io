<svg xmlns="http://www.w3.org/2000/svg" width="90" height="90" viewBox="0 0 90 90">
  <rect width="90" height="90" fill="#dbeafe"/>
  <!-- 3D voxel grid (isometric look) -->
  <!-- Bottom layer -->
  <g opacity="0.5">
    <rect x="10" y="54" width="14" height="14" rx="1" fill="#bfdbfe"/>
    <rect x="25" y="54" width="14" height="14" rx="1" fill="#bfdbfe"/>
    <rect x="40" y="54" width="14" height="14" rx="1" fill="#bfdbfe"/>
    <rect x="55" y="54" width="14" height="14" rx="1" fill="#bfdbfe"/>
    <rect x="10" y="39" width="14" height="14" rx="1" fill="#bfdbfe"/>
    <rect x="25" y="39" width="14" height="14" rx="1" fill="#bfdbfe"/>
    <rect x="55" y="39" width="14" height="14" rx="1" fill="#bfdbfe"/>
  </g>
  <!-- Colored semantic voxels -->
  <rect x="40" y="39" width="14" height="14" rx="1" fill="#3b82f6"/>
  <rect x="25" y="24" width="14" height="14" rx="1" fill="#10b981"/>
  <rect x="40" y="24" width="14" height="14" rx="1" fill="#f59e0b"/>
  <rect x="55" y="39" width="14" height="14" rx="1" fill="#8b5cf6" opacity="0.8"/>
  <rect x="10" y="24" width="14" height="14" rx="1" fill="#3b82f6" opacity="0.6"/>
  <!-- Query label -->
  <rect x="8" y="74" width="38" height="10" rx="3" fill="#1d4ed8"/>
  <text x="27" y="82" font-family="sans-serif" font-size="5.5" fill="white" text-anchor="middle">open-vocab query</text>
  <!-- Camera icon top right -->
  <rect x="62" y="10" width="18" height="13" rx="2" fill="none" stroke="#1d4ed8" stroke-width="1.5"/>
  <circle cx="71" cy="16.5" r="3.5" fill="none" stroke="#1d4ed8" stroke-width="1.5"/>
  <rect x="66" y="8" width="6" height="3" rx="1" fill="#1d4ed8"/>
</svg>
