<svg xmlns="http://www.w3.org/2000/svg" width="90" height="90" viewBox="0 0 90 90">
  <rect width="90" height="90" fill="#dbeafe"/>
  <!-- Robot base -->
  <rect x="32" y="68" width="26" height="8" rx="2" fill="#1d4ed8"/>
  <rect x="38" y="60" width="14" height="10" rx="1" fill="#2563eb"/>
  <!-- Robot arm link 1 -->
  <rect x="42" y="40" width="6" height="22" rx="3" fill="#3b82f6" transform="rotate(-15 45 62)"/>
  <!-- Robot arm link 2 -->
  <rect x="42" y="22" width="6" height="22" rx="3" fill="#2563eb" transform="rotate(20 45 44)"/>
  <!-- Robot arm link 3 (end effector) -->
  <rect x="43" y="12" width="5" height="14" rx="2.5" fill="#1d4ed8" transform="rotate(-10 45 26)"/>
  <!-- Joint circles -->
  <circle cx="45" cy="62" r="4" fill="#93c5fd" stroke="#1d4ed8" stroke-width="1.5"/>
  <circle cx="48" cy="42" r="3.5" fill="#93c5fd" stroke="#1d4ed8" stroke-width="1.5"/>
  <circle cx="44" cy="24" r="3" fill="#93c5fd" stroke="#1d4ed8" stroke-width="1.5"/>
  <!-- End effector grip -->
  <line x1="40" y1="13" x2="36" y2="10" stroke="#1d4ed8" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="11" x2="54" y2="8" stroke="#1d4ed8" stroke-width="2" stroke-linecap="round"/>
  <!-- S-curve trajectory arc -->
  <path d="M60 72 C72 65 75 50 68 40 C61 30 65 18 72 12" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="3 2"/>
  <!-- RT label -->
  <rect x="6" y="74" width="22" height="10" rx="3" fill="#0891b2"/>
  <text x="17" y="82" font-family="monospace" font-size="5.5" fill="white" text-anchor="middle">PREEMPT RT</text>
</svg>
