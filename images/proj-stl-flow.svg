<svg xmlns="http://www.w3.org/2000/svg" width="90" height="90" viewBox="0 0 90 90">
  <rect width="90" height="90" fill="#dbeafe"/>
  <!-- Smooth curved trajectory path -->
  <path d="M12 68 C22 68 20 28 35 28 C50 28 48 58 63 52 C72 48 76 38 78 30" fill="none" stroke="#93c5fd" stroke-width="2.5" stroke-dasharray="4 3"/>
  <!-- STL-guided corrected path -->
  <path d="M12 68 C22 60 26 40 38 36 C50 32 54 44 65 38 C72 34 76 28 78 22" fill="none" stroke="#1d4ed8" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Waypoint dots on corrected path -->
  <circle cx="38" cy="36" r="3" fill="#1d4ed8"/>
  <circle cx="65" cy="38" r="3" fill="#1d4ed8"/>
  <!-- Start dot -->
  <circle cx="12" cy="68" r="4" fill="#3b82f6"/>
  <!-- End dot / goal -->
  <circle cx="78" cy="22" r="4" fill="#1e40af"/>
  <!-- Goal ring -->
  <circle cx="78" cy="22" r="8" fill="none" stroke="#1e40af" stroke-width="1.5" stroke-dasharray="3 2"/>
  <!-- STL label bar at bottom -->
  <rect x="8" y="74" width="26" height="10" rx="3" fill="#1d4ed8"/>
  <text x="21" y="82" font-family="monospace" font-size="6" fill="white" text-anchor="middle">STL</text>
  <rect x="38" y="74" width="44" height="10" rx="3" fill="#93c5fd"/>
  <text x="60" y="82" font-family="sans-serif" font-size="6" fill="#1e40af" text-anchor="middle">Flow Matching</text>
</svg>
