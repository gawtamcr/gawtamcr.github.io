<svg xmlns="http://www.w3.org/2000/svg" width="90" height="90" viewBox="0 0 90 90">
  <rect width="90" height="90" fill="#dbeafe"/>
  <!-- Cloth / deformable shape (wavy polygon) -->
  <path d="M18 42 C22 34 28 30 35 33 C42 36 44 28 52 27 C60 26 66 32 68 40 C70 48 66 56 60 58 C54 60 48 54 42 56 C36 58 28 56 22 52 C16 48 14 50 18 42 Z" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Fold/crease lines on cloth -->
  <path d="M30 35 C33 42 36 48 38 56" fill="none" stroke="#60a5fa" stroke-width="1" stroke-dasharray="2 2"/>
  <path d="M50 28 C51 36 52 46 54 56" fill="none" stroke="#60a5fa" stroke-width="1" stroke-dasharray="2 2"/>
  <!-- VLM box -->
  <rect x="22" y="68" width="46" height="14" rx="3" fill="#1d4ed8"/>
  <text x="45" y="78" font-family="sans-serif" font-size="6" fill="white" text-anchor="middle">VLM + Taxonomy</text>
  <!-- Arrow from cloth to VLM box -->
  <line x1="45" y1="60" x2="45" y2="67" stroke="#1d4ed8" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Eye / vision icon -->
  <ellipse cx="45" cy="18" rx="10" ry="6" fill="none" stroke="#1d4ed8" stroke-width="1.5"/>
  <circle cx="45" cy="18" r="3" fill="#1d4ed8"/>
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#1d4ed8"/>
    </marker>
  </defs>
</svg>
